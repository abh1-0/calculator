<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A beautiful modern calculator web app with glassmorphism UI, dark mode, keyboard support, and calculation history." />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Calculator — Modern Glassmorphism</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Animated background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
    <div class="orb orb--4"></div>
  </div>

  <!-- Main calculator container -->
  <main class="calculator" id="calculator" role="application" aria-label="Calculator">

    <!-- Display -->
    <section class="display" aria-live="polite" aria-atomic="true">
      <div class="display__expression" id="expression" aria-label="Expression"></div>
      <div class="display__result-row">
        <div class="display__result" id="result" aria-label="Result">0</div>
        <button
          class="display__copy-btn"
          id="copyBtn"
          title="Copy result"
          aria-label="Copy result to clipboard"
        >
          <!-- Clipboard icon (SVG) -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span class="copy-tooltip" id="copyTooltip">Copied!</span>
        </button>
      </div>
    </section>

    <!-- Button grid -->
    <section class="keypad" id="keypad" aria-label="Calculator keypad">
      <!-- Row 1 -->
      <button class="key key--fn" data-action="clear" id="key-clear">AC</button>
      <button class="key key--fn" data-action="toggle-sign" id="key-toggle">+/−</button>
      <button class="key key--fn" data-action="percent" id="key-percent">%</button>
      <button class="key key--op" data-action="operator" data-value="/" id="key-divide">÷</button>

      <!-- Row 2 -->
      <button class="key" data-action="number" data-value="7" id="key-7">7</button>
      <button class="key" data-action="number" data-value="8" id="key-8">8</button>
      <button class="key" data-action="number" data-value="9" id="key-9">9</button>
      <button class="key key--op" data-action="operator" data-value="*" id="key-multiply">×</button>

      <!-- Row 3 -->
      <button class="key" data-action="number" data-value="4" id="key-4">4</button>
      <button class="key" data-action="number" data-value="5" id="key-5">5</button>
      <button class="key" data-action="number" data-value="6" id="key-6">6</button>
      <button class="key key--op" data-action="operator" data-value="-" id="key-subtract">−</button>

      <!-- Row 4 -->
      <button class="key" data-action="number" data-value="1" id="key-1">1</button>
      <button class="key" data-action="number" data-value="2" id="key-2">2</button>
      <button class="key" data-action="number" data-value="3" id="key-3">3</button>
      <button class="key key--op" data-action="operator" data-value="+" id="key-add">+</button>

      <!-- Row 5 -->
      <button class="key key--wide" data-action="number" data-value="0" id="key-0">0</button>
      <button class="key" data-action="decimal" id="key-decimal">.</button>
      <button class="key key--equals" data-action="equals" id="key-equals">=</button>
    </section>

    <!-- History toggle -->
    <button class="history-toggle" id="historyToggle" title="Calculation history" aria-label="Toggle calculation history">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>
  </main>

  <!-- History panel (slides in from right) -->
  <aside class="history-panel" id="historyPanel" aria-label="Calculation history">
    <div class="history-panel__header">
      <h2 class="history-panel__title">History</h2>
      <div class="history-panel__actions">
        <button class="history-panel__clear-btn" id="historyClear" title="Clear history" aria-label="Clear all history">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
        <button class="history-panel__close-btn" id="historyClose" title="Close history" aria-label="Close history panel">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <ul class="history-panel__list" id="historyList" aria-label="History entries">
      <li class="history-panel__empty" id="historyEmpty">No calculations yet</li>
    </ul>
  </aside>

  <!-- Backdrop overlay for history panel on mobile -->
  <div class="backdrop" id="backdrop" aria-hidden="true"></div>

  <!-- Keyboard shortcut hint (bottom) -->
  <footer class="shortcut-hint" aria-label="Keyboard shortcut hint">
    <span>Use keyboard for quick input</span>
    <kbd>Esc</kbd> = Clear &nbsp; <kbd>Enter</kbd> = Equals &nbsp; <kbd>Backspace</kbd> = Delete
  </footer>

  <!-- Scripts -->
  <script src="js/calculator.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
